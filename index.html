<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFR Trading</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-content">
            <h1>RYFR Trading</h1>
            <div class="nav-links">
                <a href="#picks">Picks</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="picks" class="fade-in">
            <div class="picks-grid">
                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>RKLB</h2>
                            <span class="stock-name">Rocket Lab</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$8.75</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" data-symbol="RKLB">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" data-entry="8.75">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>PLTR</h2>
                            <span class="stock-name">Palantir</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$31.00</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" data-symbol="PLTR">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" data-entry="31.00">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>HUT</h2>
                            <span class="stock-name">Hut 8 Mining</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$19.50</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" data-symbol="HUT">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" data-entry="19.50">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="fade-in">
            <div class="contact-container">
                <h2>Get in Touch</h2>
                <form id="contactForm">
                    <div class="input-group">
                        <input type="text" id="name" required>
                        <label for="name">Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="input-group">
                        <textarea id="message" required></textarea>
                        <label for="message">Message</label>
                    </div>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        // Function to format price with color
        function formatPrice(current, entry) {
            const diff = ((current - entry) / entry * 100).toFixed(2);
            const color = diff >= 0 ? '#4CAF50' : '#FF4444';
            return `<span style="color: ${color}">${diff}%</span>`;
        }

        // Function to update stock prices using Yahoo Finance
        async function updatePrices() {
            const symbols = ['RKLB', 'PLTR', 'HUT'];
            
            symbols.forEach(async (symbol) => {
                try {
                    const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`);
                    const data = await response.json();
                    
                    const currentPrice = data.chart.result[0].meta.regularMarketPrice;
                    const priceElement = document.querySelector(`.live-price[data-symbol="${symbol}"]`);
                    const gainLossElement = document.querySelector(`.gain-loss[data-entry]`);
                    const entryPrice = parseFloat(gainLossElement.dataset.entry);

                    priceElement.textContent = `$${currentPrice.toFixed(2)}`;
                    gainLossElement.innerHTML = formatPrice(currentPrice, entryPrice);
                } catch (error) {
                    console.error(`Error fetching price for ${symbol}:`, error);
                }
            });
        }

        // Update prices every 5 seconds (to avoid rate limiting)
        setInterval(updatePrices, 5000);
        updatePrices(); // Initial update

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
