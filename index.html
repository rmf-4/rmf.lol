<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYFR Trading</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-content">
            <h1>RYFR Trading</h1>
            <div class="nav-links">
                <a href="#picks">Picks</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="picks" class="fade-in">
            <div class="picks-grid">
                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>RKLB</h2>
                            <span class="stock-name">Rocket Lab</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$8.75</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" id="RKLB-price">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" id="RKLB-gain" data-entry="8.75">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>PLTR</h2>
                            <span class="stock-name">Palantir</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$31.00</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" id="PLTR-price">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" id="PLTR-gain" data-entry="31.00">--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stock-card">
                    <div class="stock-content">
                        <div class="stock-header">
                            <h2>HUT</h2>
                            <span class="stock-name">Hut 8 Mining</span>
                        </div>
                        <div class="stock-price">
                            <div class="price-row">
                                <span>Entry</span>
                                <span class="entry-price">$19.50</span>
                            </div>
                            <div class="price-row">
                                <span>Current</span>
                                <span class="live-price" id="HUT-price">Loading...</span>
                            </div>
                            <div class="price-row">
                                <span>Gain/Loss</span>
                                <span class="gain-loss" id="HUT-gain" data-entry="19.50">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="fade-in">
            <div class="contact-container">
                <h2>Get in Touch</h2>
                <form id="contactForm">
                    <div class="input-group">
                        <input type="text" id="name" required>
                        <label for="name">Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="input-group">
                        <textarea id="message" required></textarea>
                        <label for="message">Message</label>
                    </div>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        function formatPrice(current, entry) {
            const diff = ((current - entry) / entry * 100).toFixed(2);
            const color = diff >= 0 ? '#4CAF50' : '#FF4444';
            const sign = diff >= 0 ? '+' : '';
            return `<span style="color: ${color}">${sign}${diff}%</span>`;
        }

        async function updatePrice(symbol, entryPrice) {
            const priceElement = document.getElementById(`${symbol}-price`);
            const gainElement = document.getElementById(`${symbol}-gain`);

            try {
                // Using 12Data API (free tier)
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${symbol}&apikey=demo`);
                const data = await response.json();
                
                if (data.price) {
                    const currentPrice = parseFloat(data.price);
                    priceElement.textContent = `$${currentPrice.toFixed(2)}`;
                    gainElement.innerHTML = formatPrice(currentPrice, entryPrice);
                } else {
                    throw new Error('Invalid API response');
                }
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
                // Fallback to Yahoo Finance API
                try {
                    const response = await fetch(`https://query2.finance.yahoo.com/v10/finance/quoteSummary/${symbol}?modules=price`);
                    const data = await response.json();
                    const currentPrice = data.quoteSummary.result[0].price.regularMarketPrice.raw;
                    
                    priceElement.textContent = `$${currentPrice.toFixed(2)}`;
                    gainElement.innerHTML = formatPrice(currentPrice, entryPrice);
                } catch (fallbackError) {
                    console.error(`Fallback error for ${symbol}:`, fallbackError);
                    priceElement.textContent = 'Error loading';
                    gainElement.textContent = '--';
                }
            }
        }

        async function updateAllPrices() {
            await updatePrice('RKLB', 8.75);
            await new Promise(resolve => setTimeout(resolve, 1000)); // Delay between requests
            await updatePrice('PLTR', 31.00);
            await new Promise(resolve => setTimeout(resolve, 1000));
            await updatePrice('HUT', 19.50);
        }

        // Initial update
        updateAllPrices();

        // Update every 30 seconds
        setInterval(updateAllPrices, 30000);

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
